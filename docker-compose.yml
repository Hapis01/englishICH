name: englishich

services:

  # ── PHP-FPM (source code bind-mounted dari host) ─────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # hanya PHP runtime, bukan code
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - .:/var/www/html                               # source code dari host (git pull langsung aktif)
      - vendor:/var/www/html/vendor                   # composer vendor (managed)
      - storage_app:/var/www/html/storage/app         # user uploads (persistent)
      - logs:/var/www/html/storage/logs               # log files (persistent)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  # ── Nginx internal ───────────────────────────────────────
  # Serve static files dari image (Vite build, favicon, robots.txt)
  # PHP di-proxy ke app:9000 – tidak butuh mount public/ dari host
  # Rebuild nginx hanya ketika ada perubahan di resources/ (frontend)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_app:/app-storage:ro                   # untuk URL /storage/
      - public_uploads:/var/www/html/public/images    # user uploads ke public/images
    depends_on:
      - app
    networks:
      - app-net

  # ── MariaDB ──────────────────────────────────────────────
  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: db_ich_english
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db_ich_english.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - app-net

  # ── Queue worker ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage_app:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db_data:
  vendor:
  storage_app:
  public_uploads:
  logs:
